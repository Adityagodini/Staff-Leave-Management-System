{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SLMS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;

            font-family:
                "Segoe UI",
                Arial,
                sans-serif;

            background-image:
                linear-gradient(
                    135deg,
                    rgba(5, 15, 35, 0.60),
                    rgba(12, 45, 80, 0.40),
                    rgba(20, 80, 110, 0.20)
                ),
                url("{% static 'images/bg.png' %}");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;

            color: white;

            padding: 30px 20px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;

            letter-spacing: 8px;

            margin-bottom: 15px;

            color: white;

            text-shadow:
                0 4px 15px
                rgba(0, 0, 0, 0.4);
        }

        body > p {
            font-size: 1.5rem;
            font-weight: 500;

            margin-bottom: 25px;

            color:
                rgba(255, 255, 255, 0.95);
        }

        a {
            display: inline-block;

            min-width: 150px;

            padding: 13px 30px;
            margin: 8px;

            border-radius: 30px;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #0ea5e9
                );

            color: white;

            text-decoration: none;

            font-size: 1rem;
            font-weight: 700;

            transition: 0.3s ease;

            box-shadow:
                0 8px 20px
                rgba(0, 0, 0, 0.25);
        }

        a:hover {
            transform:
                translateY(-3px);

            box-shadow:
                0 12px 25px
                rgba(0, 0, 0, 0.35);
        }

        footer {
            position: absolute;

            bottom: 15px;

            width: 100%;

            text-align: center;
        }

        footer p {
            font-size: 0.9rem;

            color:
                rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <h1>SLMS</h1>

    <p>
        Staff Leave Management System
    </p>

    <div>
        <a href="{% url 'login' %}">
            Login
        </a>

        <a href="{% url 'register' %}">
            Register
        </a>
    </div>

    <footer>
        <p>
            &copy; 2026 SLMS.
            All rights reserved.
        </p>
    </footer>

</body>
</html>
