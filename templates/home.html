<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            background-image: url("https://th.bing.com/th/id/OIP.aYQZRaH1Sl3uMlgRU4XLOAHaE7?w=246&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            

        }

        h1{
            font-size: 4rem;
            color: #100f0f;
            margin-bottom: 20px;
            font-weight: 900;
        }
        p{
            font-size: 1.5rem;
            color: #070505;
            margin-bottom: 30px;
            font-weight: 900;
        }
        a{
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 10px;
        }
        a:hover{
            background-color: #0056b3;
        }
        footer{
            position: absolute;
            bottom: 10px;
            font-size: 1rem;
            color: #000000;
        }

    </style>
</head>
<body>
    <h1>SLMS</h1>
    <p>Staff Leave Management System</p>
    <a href = "{% url 'login' %}">Login</a>
    <a href = "{% url 'register' %}">Register</a> <br><br><br><br>
    <footer>
        <p>&copy; 2003 SLMS. All rights reserved.</p>
    </footer>
</body>
</html>
