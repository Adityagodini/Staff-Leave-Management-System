<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
<style>
    /* ==============================
       GLOBAL RESET
    ============================== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;

        background:
            radial-gradient(
                circle at top left,
                rgba(59, 130, 246, 0.12),
                transparent 35%
            ),
            radial-gradient(
                circle at bottom right,
                rgba(124, 58, 237, 0.10),
                transparent 35%
            ),
            linear-gradient(
                135deg,
                #f8fafc,
                #eef4ff
            );

        color: #1e293b;
    }


    /* ==============================
       HEADER
    ============================== */
    header {
        width: 100%;
        min-height: 85px;

        padding: 18px 6%;

        background:
            linear-gradient(
                135deg,
                #0f172a,
                #172554,
                #1e3a8a
            );

        display: flex;
        justify-content: space-between;
        align-items: center;

        box-shadow:
            0 8px 25px rgba(15, 23, 42, 0.18);

        position: relative;
        overflow: hidden;
    }


    /* Decorative glow */
    header::after {
        content: "";

        position: absolute;

        width: 230px;
        height: 230px;

        right: 15%;
        top: -160px;

        border-radius: 50%;

        background:
            rgba(56, 189, 248, 0.18);

        filter: blur(35px);

        pointer-events: none;
    }


    /* ==============================
       DASHBOARD TITLE
    ============================== */
    h1 {
        position: relative;
        z-index: 1;

        font-size: 2rem;
        font-weight: 800;

        color: #ffffff;

        letter-spacing: 0.5px;

        margin: 0;
    }

    h1::before {
        content: "SLMS";

        display: inline-block;

        margin-right: 14px;

        padding: 7px 12px;

        border-radius: 9px;

        background:
            linear-gradient(
                135deg,
                #38bdf8,
                #2563eb
            );

        color: #ffffff;

        font-size: 0.75rem;
        font-weight: 800;

        letter-spacing: 1px;

        vertical-align: middle;

        box-shadow:
            0 5px 15px rgba(37, 99, 235, 0.3);
    }


    /* ==============================
       NAVIGATION
    ============================== */
    nav {
        position: relative;
        z-index: 1;
    }

    nav ul {
        list-style: none;

        display: flex;
        align-items: center;

        gap: 12px;
    }

    nav ul li {
        margin: 0;
    }

    nav ul li a {
        display: inline-block;

        padding: 10px 18px;

        margin: 0;

        border-radius: 8px;

        background:
            rgba(255, 255, 255, 0.10);

        border:
            1px solid rgba(255, 255, 255, 0.16);

        color: rgba(255, 255, 255, 0.92);

        font-size: 0.92rem;
        font-weight: 600;

        text-decoration: none;

        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        transition:
            transform 0.25s ease,
            background 0.25s ease,
            box-shadow 0.25s ease;
    }

    nav ul li a:hover {
        transform: translateY(-2px);

        background:
            rgba(255, 255, 255, 0.20);

        box-shadow:
            0 6px 15px rgba(0, 0, 0, 0.15);
    }


    /* Logout button */
    nav ul li:last-child a {
        background:
            rgba(239, 68, 68, 0.15);

        border-color:
            rgba(248, 113, 113, 0.35);

        color: #fecaca;
    }

    nav ul li:last-child a:hover {
        background: #ef4444;
        color: #ffffff;
    }


    /* ==============================
       MAIN MANAGEMENT AREA
    ============================== */
    .manage {
        width: min(1100px, 90%);

        margin: 65px auto;

        padding: 40px;

        background:
            rgba(255, 255, 255, 0.85);

        border:
            1px solid rgba(255, 255, 255, 0.9);

        border-radius: 20px;

        box-shadow:
            0 20px 50px rgba(15, 23, 42, 0.10);

        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        position: relative;
    }


    /* Small dashboard heading */
    .manage::before {
        content: "Management Overview";

        display: block;

        margin-bottom: 28px;

        color: #0f172a;

        font-size: 1.35rem;
        font-weight: 800;

        letter-spacing: 0.2px;
    }


    /* ==============================
       CARDS CONTAINER
    ============================== */
    .cards {
        display: grid;

        grid-template-columns:
            repeat(2, minmax(0, 1fr));

        gap: 28px;

        margin: 0;
    }


    /* ==============================
       DASHBOARD CARDS
    ============================== */
    .leave-request,
    .staff-manage {
        min-height: 260px;

        padding: 32px;

        border-radius: 18px;

        display: flex;
        flex-direction: column;

        justify-content: center;
        align-items: flex-start;

        position: relative;
        overflow: hidden;

        transition:
            transform 0.3s ease,
            box-shadow 0.3s ease;
    }


    /* Leave card */
    .leave-request {
        background:
            linear-gradient(
                145deg,
                #eff6ff,
                #dbeafe
            );

        border:
            1px solid #bfdbfe;

        box-shadow:
            0 12px 28px rgba(37, 99, 235, 0.10);
    }


    /* Staff card */
    .staff-manage {
        background:
            linear-gradient(
                145deg,
                #f5f3ff,
                #ede9fe
            );

        border:
            1px solid #ddd6fe;

        box-shadow:
            0 12px 28px rgba(124, 58, 237, 0.10);
    }


    /* Decorative circles */
    .leave-request::after,
    .staff-manage::after {
        content: "";

        position: absolute;

        width: 150px;
        height: 150px;

        border-radius: 50%;

        right: -55px;
        top: -55px;

        opacity: 0.20;
    }

    .leave-request::after {
        background: #2563eb;
    }

    .staff-manage::after {
        background: #7c3aed;
    }


    /* Card hover */
    .leave-request:hover,
    .staff-manage:hover {
        transform: translateY(-7px);

        box-shadow:
            0 20px 40px rgba(15, 23, 42, 0.15);
    }


    /* ==============================
       CARD TITLES
    ============================== */
    .cards h3 {
        position: relative;
        z-index: 1;

        margin-bottom: 12px;

        color: #0f172a;

        font-size: 1.45rem;
        font-weight: 800;
    }


    /* Add simple icons without HTML changes */
    .leave-request h3::before {
        content: "📋";

        display: block;

        margin-bottom: 18px;

        width: 52px;
        height: 52px;

        line-height: 52px;

        text-align: center;

        border-radius: 14px;

        background:
            rgba(37, 99, 235, 0.12);

        font-size: 1.5rem;
    }

    .staff-manage h3::before {
        content: "👥";

        display: block;

        margin-bottom: 18px;

        width: 52px;
        height: 52px;

        line-height: 52px;

        text-align: center;

        border-radius: 14px;

        background:
            rgba(124, 58, 237, 0.12);

        font-size: 1.5rem;
    }


    /* ==============================
       CARD DESCRIPTION
    ============================== */
    .cards p {
        position: relative;
        z-index: 1;

        margin-bottom: 22px;

        color: #64748b;

        font-size: 1rem;

        line-height: 1.6;
    }


    /* ==============================
       GENERAL CARD BUTTONS
    ============================== */
    .cards a {
        position: relative;
        z-index: 1;

        display: inline-block;

        padding: 11px 22px;

        margin: 0;

        border-radius: 9px;

        color: #ffffff;

        font-size: 0.95rem;
        font-weight: 700;

        text-decoration: none;

        transition:
            transform 0.25s ease,
            box-shadow 0.25s ease;
    }


    /* Leave button */
    .leave-request a {
        background:
            linear-gradient(
                135deg,
                #2563eb,
                #0ea5e9
            );

        box-shadow:
            0 8px 18px rgba(37, 99, 235, 0.25);
    }


    /* Staff button */
    .staff-manage a {
        background:
            linear-gradient(
                135deg,
                #7c3aed,
                #8b5cf6
            );

        box-shadow:
            0 8px 18px rgba(124, 58, 237, 0.25);
    }


    .cards a:hover {
        transform: translateY(-3px);

        box-shadow:
            0 12px 24px rgba(15, 23, 42, 0.20);
    }


    /* ==============================
       TABLET RESPONSIVE
    ============================== */
    @media (max-width: 768px) {

        header {
            padding: 18px 4%;

            flex-direction: column;

            gap: 18px;

            text-align: center;
        }

        h1 {
            font-size: 1.7rem;
        }

        nav ul {
            justify-content: center;
            flex-wrap: wrap;
        }

        .manage {
            width: 92%;

            margin: 40px auto;

            padding: 28px;
        }

        .cards {
            grid-template-columns: 1fr;
        }
    }


    /* ==============================
       MOBILE RESPONSIVE
    ============================== */
    @media (max-width: 480px) {

        header {
            padding: 16px 12px;
        }

        h1 {
            font-size: 1.45rem;
        }

        h1::before {
            display: block;

            width: fit-content;

            margin: 0 auto 10px;
        }

        nav ul {
            gap: 8px;
        }

        nav ul li a {
            padding: 9px 12px;

            font-size: 0.82rem;
        }

        .manage {
            width: 94%;

            margin: 28px auto;

            padding: 20px;

            border-radius: 15px;
        }

        .manage::before {
            font-size: 1.15rem;

            margin-bottom: 20px;
        }

        .cards {
            gap: 18px;
        }

        .leave-request,
        .staff-manage {
            min-height: 230px;

            padding: 24px;

            border-radius: 14px;
        }

        .cards h3 {
            font-size: 1.25rem;
        }
    }


    /* ==============================
       REDUCED MOTION
    ============================== */
    @media (prefers-reduced-motion: reduce) {

        .leave-request,
        .staff-manage,
        nav ul li a,
        .cards a {
            transition: none;
        }
    }
</style>
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <nav>
            <ul>
                <li><a href="{% url 'view_leaves' %}">View Leave Request</a></li>
                <li><a href="{% url 'logout' %}">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="manage">
        <div class="cards">
            <div class="leave-request">
                <h3>Total leave request</h3>
                <p>Manage all Staff request</p>
                <a href = "{% url 'view_leaves' %}">Open</a>
            </div>

            <div class="staff-manage">
                <h3>Manage Staff</h3>
                <p>View register staff users</p>
                <a href = "{% url 'manage_staff' %}">Manage Staff</a>
            </div>

        </div>
    </div>
</body>
</html>
