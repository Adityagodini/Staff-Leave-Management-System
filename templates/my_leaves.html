<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        h2{
            text-align: center;
            margin-bottom: 20px;
        }
        table{
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td{
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th{
            background-color: #333;
            color: #fff;
        }
        a{
            text-decoration: none;
            color: #007bff;
        }
        a:hover{
            text-decoration: underline;
        }

        #approve, #reject{
            margin-right: 10px;
        }
        #approve{
            display: inline-block;
            color: rgb(255, 255, 255);
            background: green;
            padding: 12px 22px;
            border: 1.5px solid #f9f9f9;
            font-weight: 600;
        }
        #reject{
            display:inline-block;
            color: white;
            background:red;
            padding:12px 22px;
            border:1.5px solid #d40d0d;
            font-weight: 600;
        }
        #bdashboard{
            text-decoration: none;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:600;
            font-size:1.2rem;
        }
        #bdashboard:hover{
            text-decoration:underline;
        }
        #status{
            display:inline-block;
            color: white;
            background:red;
            padding:12px 22px;
            border:1.5px solid #d40d0d;
            font-weight: 600;
        }

    </style>
</head>
<body>
    <h2>My Leaves</h2>
    <table bordder="1">
        <tr>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th >Status</th>
        </tr>
        {% for i in leaves %}
        <tr>
            <td>{{ i.leave_type }}</td>
            <td>{{ i.start_date }}</td>
            <td>{{ i.end_date }}</td>
            <td>{{ i.reason }}</td>
            <td id="status">{{ i.status }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan = "5"> No Leave Applications Found</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'staff_dashboard' %}" id="bdashboard">Back to Dashboard</a>
</body>
</html>
