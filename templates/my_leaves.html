<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leaves</title>
<style>
    /* ==============================
       GLOBAL RESET
    ============================== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        min-height: 100vh;
        padding: 50px 5%;

        font-family: "Segoe UI", Arial, sans-serif;

        color: #1e293b;

        background:
            radial-gradient(
                circle at top left,
                rgba(56, 189, 248, 0.18),
                transparent 30%
            ),
            radial-gradient(
                circle at bottom right,
                rgba(124, 58, 237, 0.14),
                transparent 32%
            ),
            linear-gradient(
                135deg,
                #f8fafc,
                #eef4ff
            );

        position: relative;
        overflow-x: hidden;
    }


    /* ==============================
       BACKGROUND DECORATION
    ============================== */
    body::before {
        content: "";

        position: fixed;

        width: 330px;
        height: 330px;

        top: -150px;
        left: -120px;

        border-radius: 50%;

        background:
            rgba(37, 99, 235, 0.12);

        filter: blur(55px);

        pointer-events: none;
    }

    body::after {
        content: "";

        position: fixed;

        width: 350px;
        height: 350px;

        right: -140px;
        bottom: -160px;

        border-radius: 50%;

        background:
            rgba(124, 58, 237, 0.12);

        filter: blur(60px);

        pointer-events: none;
    }


    /* ==============================
       PAGE TITLE
    ============================== */
    h2 {
        position: relative;
        z-index: 1;

        width: min(1200px, 100%);

        margin: 0 auto 28px;

        color: #0f172a;

        font-size: clamp(2rem, 5vw, 2.8rem);
        font-weight: 800;

        text-align: center;

        letter-spacing: 0.4px;

        animation:
            fadeDown 0.7s ease;
    }


    /* SLMS badge */
    h2::before {
        content: "SLMS";

        display: block;

        width: fit-content;

        margin: 0 auto 12px;

        padding: 6px 14px;

        border-radius: 20px;

        background:
            linear-gradient(
                135deg,
                #38bdf8,
                #2563eb
            );

        color: #ffffff;

        font-size: 0.7rem;
        font-weight: 800;

        letter-spacing: 2px;

        box-shadow:
            0 7px 18px rgba(37, 99, 235, 0.25);
    }


    /* ==============================
       TABLE
    ============================== */
    table {
        position: relative;
        z-index: 1;

        width: min(1200px, 100%);

        margin: 0 auto 30px;

        border-collapse: separate;
        border-spacing: 0;

        background:
            rgba(255, 255, 255, 0.96);

        border:
            1px solid rgba(226, 232, 240, 0.95);

        border-radius: 18px;

        overflow: hidden;

        box-shadow:
            0 20px 45px rgba(15, 23, 42, 0.10);

        animation:
            fadeUp 0.8s ease;
    }


    /* ==============================
       TABLE HEADER
    ============================== */
    th {
        padding: 17px 18px;

        text-align: left;

        background:
            linear-gradient(
                135deg,
                #0f172a,
                #172554,
                #1e3a8a
            );

        color: #ffffff;

        font-size: 0.9rem;
        font-weight: 700;

        letter-spacing: 0.4px;

        border: none;
    }


    /* ==============================
       TABLE CELLS
    ============================== */
    td {
        padding: 17px 18px;

        text-align: left;

        color: #475569;

        font-size: 0.94rem;
        font-weight: 500;

        line-height: 1.5;

        background:
            rgba(255, 255, 255, 0.92);

        border-bottom:
            1px solid #e8edf5;

        transition:
            background 0.25s ease,
            color 0.25s ease;
    }


    /* Last row */
    tr:last-child td {
        border-bottom: none;
    }


    /* Row hover */
    tr:not(:first-child):hover td {
        background: #f8fbff;
        color: #1e293b;
    }


    /* Alternate rows */
    tr:nth-child(even) td {
        background:
            rgba(248, 250, 252, 0.85);
    }

    tr:nth-child(even):hover td {
        background: #f1f6ff;
    }


    /* ==============================
       LEAVE TYPE COLUMN
    ============================== */
    td:first-child {
        color: #1e3a8a;

        font-weight: 700;

        text-transform: capitalize;
    }


    /* ==============================
       REASON COLUMN
    ============================== */
    td:nth-child(4) {
        max-width: 320px;

        color: #64748b;
    }


    /* ==============================
       STATUS BADGE
    ============================== */
    #status {
        color: #ffffff;

        font-weight: 700;

        text-align: center;

        text-transform: capitalize;

        background:
            linear-gradient(
                135deg,
                #f59e0b,
                #d97706
            );

        border: none;

        box-shadow:
            inset 0 0 0 1px
            rgba(255, 255, 255, 0.15);
    }


    /* ==============================
       GENERAL LINKS
    ============================== */
    a {
        text-decoration: none;

        color: #2563eb;

        transition:
            color 0.25s ease,
            transform 0.25s ease;
    }

    a:hover {
        color: #1d4ed8;
    }


    /* ==============================
       BACK TO DASHBOARD BUTTON
    ============================== */
    #bdashboard {
        position: relative;
        z-index: 1;

        width: fit-content;

        margin: 0 auto;

        padding: 12px 24px;

        display: flex;
        justify-content: center;
        align-items: center;

        border-radius: 10px;

        background:
            linear-gradient(
                135deg,
                #2563eb,
                #0ea5e9
            );

        color: #ffffff;

        font-size: 0.95rem;
        font-weight: 700;

        text-decoration: none;

        box-shadow:
            0 9px 22px rgba(37, 99, 235, 0.25);

        transition:
            transform 0.25s ease,
            box-shadow 0.25s ease;
    }


    #bdashboard::before {
        content: "←";

        margin-right: 8px;

        font-size: 1.15rem;

        transition:
            transform 0.25s ease;
    }


    #bdashboard:hover {
        color: #ffffff;

        text-decoration: none;

        transform: translateY(-3px);

        box-shadow:
            0 13px 28px rgba(37, 99, 235, 0.32);
    }


    #bdashboard:hover::before {
        transform: translateX(-3px);
    }


    /* ==============================
       UNUSED APPROVE / REJECT
       KEPT FOR COMPATIBILITY
    ============================== */
    #approve,
    #reject {
        display: inline-block;

        margin-right: 8px;

        padding: 9px 16px;

        border-radius: 8px;

        color: #ffffff;

        font-size: 0.85rem;
        font-weight: 700;

        text-decoration: none;

        transition:
            transform 0.25s ease,
            box-shadow 0.25s ease;
    }

    #approve {
        background:
            linear-gradient(
                135deg,
                #16a34a,
                #22c55e
            );

        border: none;
    }

    #reject {
        background:
            linear-gradient(
                135deg,
                #dc2626,
                #ef4444
            );

        border: none;
    }

    #approve:hover,
    #reject:hover {
        color: #ffffff;

        text-decoration: none;

        transform: translateY(-2px);

        box-shadow:
            0 8px 18px rgba(15, 23, 42, 0.18);
    }


    /* ==============================
       EMPTY TABLE MESSAGE
    ============================== */
    td[colspan="5"] {
        padding: 35px 20px;

        text-align: center;

        color: #64748b;

        font-size: 1rem;
        font-weight: 600;

        background: #ffffff;
    }


    /* ==============================
       ANIMATIONS
    ============================== */
    @keyframes fadeDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }


    /* ==============================
       TABLET RESPONSIVE
    ============================== */
    @media (max-width: 900px) {

        body {
            padding: 40px 3%;
        }

        table {
            display: block;

            overflow-x: auto;

            white-space: nowrap;

            border-radius: 14px;
        }

        th,
        td {
            padding: 15px;
        }

        td:nth-child(4) {
            max-width: none;
        }
    }


    /* ==============================
       MOBILE RESPONSIVE
    ============================== */
    @media (max-width: 600px) {

        body {
            padding: 30px 14px;
        }

        h2 {
            font-size: 2rem;

            margin-bottom: 22px;
        }

        table {
            width: 100%;

            margin-bottom: 24px;
        }

        th,
        td {
            padding: 13px 14px;

            font-size: 0.84rem;
        }

        #bdashboard {
            padding: 11px 18px;

            font-size: 0.88rem;
        }
    }


    /* ==============================
       REDUCED MOTION
    ============================== */
    @media (prefers-reduced-motion: reduce) {

        h2,
        table {
            animation: none;
        }

        a,
        #bdashboard,
        #approve,
        #reject {
            transition: none;
        }
    }
</style>
</head>
<body>
    <h2>My Leaves</h2>
    <table bordder="1">
        <tr>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th >Status</th>
        </tr>
        {% for i in leaves %}
        <tr>
            <td>{{ i.leave_type }}</td>
            <td>{{ i.start_date }}</td>
            <td>{{ i.end_date }}</td>
            <td>{{ i.reason }}</td>
            <td id="status">{{ i.status }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan = "5"> No Leave Applications Found</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'staff_dashboard' %}" id="bdashboard">Back to Dashboard</a>
</body>
</html>
