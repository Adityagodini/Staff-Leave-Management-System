<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    /* ==============================
       GLOBAL RESET
    ============================== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        min-height: 100vh;
        padding: 40px 20px;

        font-family: "Segoe UI", Arial, sans-serif;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        text-align: center;

        color: #1e293b;

        background:
            radial-gradient(
                circle at top left,
                rgba(56, 189, 248, 0.20),
                transparent 32%
            ),
            radial-gradient(
                circle at bottom right,
                rgba(124, 58, 237, 0.16),
                transparent 34%
            ),
            linear-gradient(
                135deg,
                #0f172a,
                #172554,
                #1e3a8a
            );

        position: relative;
        overflow-x: hidden;
    }


    /* ==============================
       BACKGROUND DECORATION
    ============================== */
    body::before {
        content: "";

        position: fixed;

        width: 350px;
        height: 350px;

        top: -140px;
        left: -120px;

        border-radius: 50%;

        background:
            rgba(14, 165, 233, 0.18);

        filter: blur(55px);

        pointer-events: none;
    }

    body::after {
        content: "";

        position: fixed;

        width: 350px;
        height: 350px;

        right: -120px;
        bottom: -140px;

        border-radius: 50%;

        background:
            rgba(139, 92, 246, 0.18);

        filter: blur(60px);

        pointer-events: none;
    }


    /* ==============================
       MAIN TITLE
    ============================== */
    h1 {
        position: relative;
        z-index: 1;

        margin-bottom: 10px;

        color: #ffffff;

        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 900;

        letter-spacing: 1px;

        text-shadow:
            0 5px 18px rgba(0, 0, 0, 0.28);

        animation:
            fadeDown 0.7s ease;
    }


    /* SLMS badge */
    h1::before {
        content: "SLMS";

        display: block;

        width: fit-content;

        margin: 0 auto 14px;

        padding: 7px 14px;

        border-radius: 20px;

        background:
            linear-gradient(
                135deg,
                #38bdf8,
                #2563eb
            );

        color: #ffffff;

        font-size: 0.72rem;
        font-weight: 800;

        letter-spacing: 2px;

        box-shadow:
            0 7px 18px rgba(37, 99, 235, 0.28);
    }


    /* ==============================
       SUBTITLE
    ============================== */
    h2 {
        position: relative;
        z-index: 1;

        margin-bottom: 28px;

        color:
            rgba(255, 255, 255, 0.78);

        font-size: clamp(1rem, 3vw, 1.25rem);
        font-weight: 500;

        letter-spacing: 0.7px;

        animation:
            fadeUp 0.8s ease;
    }


    /* ==============================
       LOGIN FORM CARD
    ============================== */
    form {
        position: relative;
        z-index: 1;

        width: min(420px, 100%);

        padding: 34px 32px;

        border-radius: 20px;

        background:
            rgba(255, 255, 255, 0.96);

        border:
            1px solid rgba(255, 255, 255, 0.85);

        box-shadow:
            0 22px 55px rgba(0, 0, 0, 0.25);

        text-align: left;

        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);

        animation:
            fadeUp 0.9s ease;
    }


    /* Login heading inside form without HTML changes */
    form::before {
        content: "Welcome Back";

        display: block;

        margin-bottom: 6px;

        color: #0f172a;

        font-size: 1.45rem;
        font-weight: 800;

        text-align: center;
    }

    form::after {
        content: "Enter your account details to continue";

        display: block;

        margin-top: 18px;

        color: #94a3b8;

        font-size: 0.78rem;

        text-align: center;
    }


    /* ==============================
       LABELS
    ============================== */
    label {
        display: block;

        margin-bottom: 7px;

        color: #334155;

        font-size: 0.9rem;
        font-weight: 700;

        letter-spacing: 0.2px;
    }


    /* ==============================
       INPUT FIELDS
    ============================== */
    input,
    select {
        width: 100%;

        padding: 13px 14px;

        margin-bottom: 4px;

        border:
            1.5px solid #dbe3ef;

        border-radius: 10px;

        outline: none;

        background: #f8fafc;

        color: #0f172a;

        font-family: inherit;
        font-size: 0.95rem;

        transition:
            border-color 0.25s ease,
            box-shadow 0.25s ease,
            background 0.25s ease,
            transform 0.25s ease;
    }


    input:hover,
    select:hover {
        border-color: #93c5fd;
    }


    input:focus,
    select:focus {
        border-color: #2563eb;

        background: #ffffff;

        box-shadow:
            0 0 0 4px rgba(37, 99, 235, 0.12);

        transform: translateY(-1px);
    }


    /* ==============================
       LOGIN BUTTON
    ============================== */
    button {
        width: 100%;

        padding: 13px 18px;

        margin-top: 2px;

        border: none;
        border-radius: 10px;

        background:
            linear-gradient(
                135deg,
                #2563eb,
                #0ea5e9
            );

        color: #ffffff;

        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 800;

        letter-spacing: 1px;

        cursor: pointer;

        box-shadow:
            0 9px 22px rgba(37, 99, 235, 0.28);

        transition:
            transform 0.25s ease,
            box-shadow 0.25s ease,
            background 0.25s ease;
    }


    button:hover {
        transform: translateY(-3px);

        background:
            linear-gradient(
                135deg,
                #1d4ed8,
                #0284c7
            );

        box-shadow:
            0 13px 28px rgba(37, 99, 235, 0.35);
    }


    button:active {
        transform: translateY(0);
    }


    /* ==============================
       TEXT BELOW FORM
    ============================== */
    body > p {
        position: relative;
        z-index: 1;

        color:
            rgba(255, 255, 255, 0.82);

        font-size: 0.95rem;
        font-weight: 500;
    }


    /* ==============================
       REGISTER & HOME LINKS
    ============================== */
    body > p a {
        display: inline-block;

        margin-left: 5px;

        padding: 7px 14px;

        border-radius: 8px;

        color: #ffffff;

        font-weight: 700;

        text-decoration: none;

        background:
            rgba(255, 255, 255, 0.12);

        border:
            1px solid rgba(255, 255, 255, 0.20);

        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        transition:
            transform 0.25s ease,
            background 0.25s ease,
            box-shadow 0.25s ease;
    }


    body > p a:hover {
        transform: translateY(-2px);

        background:
            rgba(255, 255, 255, 0.22);

        box-shadow:
            0 7px 16px rgba(0, 0, 0, 0.15);
    }


    /* Register link highlight */
    body > p:first-of-type a {
        color: #dbeafe;

        border-color:
            rgba(56, 189, 248, 0.35);
    }


    /* ==============================
       REMOVE EXCESSIVE BR SPACING
       WITHOUT CHANGING HTML
    ============================== */
    form br {
        line-height: 8px;
    }


    /* ==============================
       ANIMATIONS
    ============================== */
    @keyframes fadeDown {
        from {
            opacity: 0;
            transform: translateY(-22px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(22px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }


    /* ==============================
       TABLET
    ============================== */
    @media (max-width: 768px) {

        body {
            padding: 32px 18px;
        }

        h1 {
            margin-bottom: 8px;
        }

        h2 {
            margin-bottom: 24px;
        }

        form {
            padding: 30px 26px;
        }
    }


    /* ==============================
       MOBILE
    ============================== */
    @media (max-width: 480px) {

        body {
            padding: 28px 14px;
        }

        h1 {
            font-size: 2.4rem;
        }

        h2 {
            font-size: 0.95rem;

            line-height: 1.5;

            margin-bottom: 22px;
        }

        form {
            width: 100%;

            padding: 26px 20px;

            border-radius: 16px;
        }

        form::before {
            font-size: 1.3rem;
        }

        input,
        select {
            padding: 12px;
        }

        button {
            padding: 12px;
        }

        body > p {
            font-size: 0.85rem;
        }

        body > p a {
            padding: 6px 10px;
        }
    }


    /* ==============================
       REDUCED MOTION
    ============================== */
    @media (prefers-reduced-motion: reduce) {

        h1,
        h2,
        form {
            animation: none;
        }

        input,
        select,
        button,
        body > p a {
            transition: none;
        }
    }
</style>
</head>
<body>
    <h1>SLMS Login</h1>
    <h2>Staff Leave Management System</h2>

    <form method = "POST">
        {% csrf_token %}
        <label>Username</label>
        <input type = "text" name = "username" required><br><br>
        <label>Password</label>
        <input type = "password" name = "password" required><br><br>
        <button type = "submit">LOGIN</button>
        
    </form>
    <br>
        <p>
            Don't have an account  ?
            <a href = "{% url 'register' %}">Register</a>
        </p>
        <br>

    <p> Back to Home
        <a href = "{% url 'home' %}">Home</a>
    </p>
</body>
</html>
