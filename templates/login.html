<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            background-color: #d0c6a6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        }
        h1{
            font-size: 4rem;
            color: #100f0f;
            margin-bottom: 20px;
            font-weight: 900;
        }
        h2{
            font-size: 1.5rem;
            color: #070505;
            margin-bottom: 30px;
            font-weight: 900;
        }
        form{
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label{
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, select{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button{
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <h1>SLMS Login</h1>
    <h2>Staff Leave Management System</h2>

    <form method = "POST">
        {% csrf_token %}
        <label>Username</label>
        <input type = "text" name = "username" required><br><br>
        <label>Password</label>
        <input type = "password" name = "password" required><br><br>
        <button type = "submit">LOGIN</button>
        
    </form>
    <br>
        <p>
            Don't have an account  ?
            <a href = "{% url 'register' %}">Register</a>
        </p>
        <br>

    <p> Back to Home
        <a href = "{% url 'home' %}">Home</a>
    </p>
</body>
</html>
