<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            background-color: #f6f0dc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        }
        h1{
            font-size: 4rem;
            color: #100f0f;
            margin-bottom: 20px;
            font-weight: 900;
        }
        a{
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 10px;
        }
        a:hover{
            background-color: #0056b3;
        }
        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th{
            background-color: #f2f2f2;
        }

    </style>
</head>
<body>
    <h1>Staff Management</h1>
    <a href="{% url 'add_staff' %}">+ Add Staff</a>
    <table>
        <tr>
            <th>Username</th>
            <th>Actions</th>
        </tr>
        {% for i in staff_list %}
        <tr>
            <td>{{ i.username }}</td>
            <td>
                <a href = "{% url 'edit_staff' i.id %}">Edit</a>
                <a href = "{% url 'delete_staff' i.id %}" onclick="return confirm('Are You Sure')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td> No Staff Found</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="{% url 'admin_dashboard' %}">Back to Dashboard</a>
</body>
</html>
