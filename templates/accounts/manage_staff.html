<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff</title>
<style>
    /* ==============================
       GLOBAL RESET
    ============================== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        min-height: 100vh;
        padding: 50px 5%;

        font-family: "Segoe UI", Arial, sans-serif;

        display: flex;
        flex-direction: column;
        align-items: center;

        color: #1e293b;

        background:
            radial-gradient(
                circle at top left,
                rgba(56, 189, 248, 0.16),
                transparent 30%
            ),
            radial-gradient(
                circle at bottom right,
                rgba(124, 58, 237, 0.13),
                transparent 32%
            ),
            linear-gradient(
                135deg,
                #f8fafc,
                #eef4ff
            );

        position: relative;
        overflow-x: hidden;
    }


    /* ==============================
       BACKGROUND DECORATION
    ============================== */
    body::before {
        content: "";

        position: fixed;

        width: 350px;
        height: 350px;

        top: -160px;
        left: -130px;

        border-radius: 50%;

        background:
            rgba(37, 99, 235, 0.12);

        filter: blur(60px);

        pointer-events: none;
    }

    body::after {
        content: "";

        position: fixed;

        width: 370px;
        height: 370px;

        right: -150px;
        bottom: -170px;

        border-radius: 50%;

        background:
            rgba(124, 58, 237, 0.12);

        filter: blur(65px);

        pointer-events: none;
    }


    /* ==============================
       PAGE TITLE
    ============================== */
    h1 {
        position: relative;
        z-index: 1;

        margin-bottom: 12px;

        color: #0f172a;

        font-size: clamp(2.3rem, 6vw, 3.6rem);
        font-weight: 900;

        text-align: center;

        letter-spacing: 0.5px;

        animation:
            fadeDown 0.7s ease;
    }


    /* SLMS ADMIN badge */
    h1::before {
        content: "SLMS ADMIN";

        display: block;

        width: fit-content;

        margin: 0 auto 12px;

        padding: 6px 14px;

        border-radius: 20px;

        background:
            linear-gradient(
                135deg,
                #38bdf8,
                #2563eb
            );

        color: #ffffff;

        font-size: 0.7rem;
        font-weight: 800;

        letter-spacing: 1.8px;

        box-shadow:
            0 7px 18px rgba(37, 99, 235, 0.25);
    }


    /* ==============================
       GENERAL LINKS
    ============================== */
    a {
        text-decoration: none;

        transition:
            transform 0.25s ease,
            box-shadow 0.25s ease,
            background 0.25s ease;
    }


    /* ==============================
       ADD STAFF BUTTON
       First direct link inside body
    ============================== */
    body > a:first-of-type {
        position: relative;
        z-index: 1;

        align-self: flex-end;

        margin:
            15px
            max(0px, calc((100% - 1100px) / 2))
            18px
            0;

        padding: 12px 22px;

        border-radius: 10px;

        background:
            linear-gradient(
                135deg,
                #2563eb,
                #0ea5e9
            );

        color: #ffffff;

        font-size: 0.92rem;
        font-weight: 800;

        box-shadow:
            0 9px 22px rgba(37, 99, 235, 0.25);
    }


    body > a:first-of-type:hover {
        transform: translateY(-3px);

        background:
            linear-gradient(
                135deg,
                #1d4ed8,
                #0284c7
            );

        box-shadow:
            0 13px 28px rgba(37, 99, 235, 0.34);
    }


    /* ==============================
       TABLE
    ============================== */
    table {
        position: relative;
        z-index: 1;

        width: min(1100px, 100%);

        margin: 0 auto 10px;

        border-collapse: separate;
        border-spacing: 0;

        background:
            rgba(255, 255, 255, 0.96);

        border-radius: 18px;

        overflow: hidden;

        box-shadow:
            0 20px 48px rgba(15, 23, 42, 0.11);

        animation:
            fadeUp 0.8s ease;
    }


    /* ==============================
       TABLE HEADER
    ============================== */
    th {
        padding: 17px 20px;

        border: none;

        background:
            linear-gradient(
                135deg,
                #0f172a,
                #172554,
                #1e3a8a
            );

        color: #ffffff;

        font-size: 0.9rem;
        font-weight: 750;

        text-align: left;

        letter-spacing: 0.4px;
    }


    /* Center Actions heading */
    th:last-child {
        text-align: center;
    }


    /* ==============================
       TABLE CELLS
    ============================== */
    td {
        padding: 17px 20px;

        border: none;

        border-bottom:
            1px solid #e8edf5;

        background:
            rgba(255, 255, 255, 0.95);

        color: #475569;

        font-size: 0.92rem;
        font-weight: 500;

        text-align: left;

        transition:
            background 0.25s ease,
            color 0.25s ease;
    }


    /* Alternate rows */
    tr:nth-child(even) td {
        background:
            rgba(248, 250, 252, 0.90);
    }


    /* Last row */
    tr:last-child td {
        border-bottom: none;
    }


    /* Row hover */
    tr:not(:first-child):hover td {
        background: #f1f6ff;

        color: #1e293b;
    }


    /* ==============================
       USERNAME COLUMN
    ============================== */
    td:first-child {
        color: #1e3a8a;

        font-weight: 750;
    }


    /* User icon */
    td:first-child::before {
        content: "👤";

        display: inline-flex;
        justify-content: center;
        align-items: center;

        width: 34px;
        height: 34px;

        margin-right: 10px;

        border-radius: 50%;

        background:
            rgba(37, 99, 235, 0.10);

        font-size: 0.9rem;

        vertical-align: middle;
    }


    /* ==============================
       ACTION COLUMN
    ============================== */
    td:last-child {
        text-align: center;

        white-space: nowrap;
    }


    /* ==============================
       EDIT BUTTON
       First link inside action cell
    ============================== */
    td:last-child a:first-child {
        display: inline-block;

        margin: 3px 5px;

        padding: 9px 17px;

        border-radius: 8px;

        background:
            linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );

        color: #ffffff;

        font-size: 0.82rem;
        font-weight: 700;

        box-shadow:
            0 6px 15px rgba(37, 99, 235, 0.20);
    }


    td:last-child a:first-child:hover {
        transform: translateY(-2px);

        background:
            linear-gradient(
                135deg,
                #1d4ed8,
                #2563eb
            );

        box-shadow:
            0 9px 20px rgba(37, 99, 235, 0.30);
    }


    /* ==============================
       DELETE BUTTON
       Last link inside action cell
    ============================== */
    td:last-child a:last-child {
        display: inline-block;

        margin: 3px 5px;

        padding: 9px 17px;

        border-radius: 8px;

        background:
            linear-gradient(
                135deg,
                #dc2626,
                #ef4444
            );

        color: #ffffff;

        font-size: 0.82rem;
        font-weight: 700;

        box-shadow:
            0 6px 15px rgba(239, 68, 68, 0.20);
    }


    td:last-child a:last-child:hover {
        transform: translateY(-2px);

        background:
            linear-gradient(
                135deg,
                #b91c1c,
                #dc2626
            );

        box-shadow:
            0 9px 20px rgba(239, 68, 68, 0.30);
    }


    /* ==============================
       EMPTY STAFF MESSAGE
    ============================== */
    td:only-child {
        padding: 38px 20px;

        color: #64748b;

        font-size: 1rem;
        font-weight: 600;

        text-align: center;
    }


    /* ==============================
       BACK TO DASHBOARD BUTTON
       Last direct link inside body
    ============================== */
    body > a:last-of-type {
        position: relative;
        z-index: 1;

        display: inline-flex;
        justify-content: center;
        align-items: center;

        margin-top: 10px;

        padding: 12px 24px;

        border-radius: 10px;

        background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a
            );

        color: #ffffff;

        font-size: 0.92rem;
        font-weight: 700;

        box-shadow:
            0 9px 22px rgba(15, 23, 42, 0.20);
    }


    body > a:last-of-type::before {
        content: "←";

        margin-right: 8px;

        font-size: 1.15rem;

        transition:
            transform 0.25s ease;
    }


    body > a:last-of-type:hover {
        transform: translateY(-3px);

        background:
            linear-gradient(
                135deg,
                #172554,
                #2563eb
            );

        box-shadow:
            0 13px 28px rgba(37, 99, 235, 0.28);
    }


    body > a:last-of-type:hover::before {
        transform: translateX(-3px);
    }


    /* ==============================
       ANIMATIONS
    ============================== */
    @keyframes fadeDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }


    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }


    /* ==============================
       TABLET RESPONSIVE
    ============================== */
    @media (max-width: 768px) {

        body {
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
        }

        body > a:first-of-type {
            align-self: center;

            margin:
                12px auto
                18px;
        }

        table {
            width: 100%;

            border-radius: 14px;
        }

        th,
        td {
            padding: 14px;
        }
    }


    /* ==============================
       MOBILE RESPONSIVE
    ============================== */
    @media (max-width: 520px) {

        body {
            padding: 30px 12px;
        }

        h1 {
            font-size: 2rem;

            margin-bottom: 10px;
        }

        h1::before {
            font-size: 0.62rem;
        }

        table {
            display: block;

            overflow-x: auto;

            border-radius: 12px;
        }

        th,
        td {
            min-width: 150px;

            padding: 12px;

            font-size: 0.82rem;
        }

        td:first-child::before {
            width: 30px;
            height: 30px;

            margin-right: 7px;
        }

        td:last-child a:first-child,
        td:last-child a:last-child {
            padding: 8px 12px;

            font-size: 0.76rem;
        }

        body > a:first-of-type,
        body > a:last-of-type {
            padding: 10px 17px;

            font-size: 0.84rem;
        }
    }


    /* ==============================
       REDUCED MOTION
    ============================== */
    @media (prefers-reduced-motion: reduce) {

        h1,
        table {
            animation: none;
        }

        a {
            transition: none;
        }
    }
</style>
</head>
<body>
    <h1>Staff Management</h1>
    <a href="{% url 'add_staff' %}">+ Add Staff</a>
    <table>
        <tr>
            <th>Username</th>
            <th>Actions</th>
        </tr>
        {% for i in staff_list %}
        <tr>
            <td>{{ i.username }}</td>
            <td>
                <a href = "{% url 'edit_staff' i.id %}">Edit</a>
                <a href = "{% url 'delete_staff' i.id %}" onclick="return confirm('Are You Sure')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2"> No Staff Found</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="{% url 'admin_dashboard' %}">Back to Dashboard</a>
</body>
</html>
