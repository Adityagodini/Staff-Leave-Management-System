<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff</title>
<style>
    /* ==============================
       GLOBAL RESET
    ============================== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        min-height: 100vh;
        padding: 40px 20px;

        font-family: "Segoe UI", Arial, sans-serif;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        color: #1e293b;

        background:
            radial-gradient(
                circle at top left,
                rgba(56, 189, 248, 0.20),
                transparent 32%
            ),
            radial-gradient(
                circle at bottom right,
                rgba(124, 58, 237, 0.16),
                transparent 34%
            ),
            linear-gradient(
                135deg,
                #0f172a,
                #172554,
                #1e3a8a
            );

        position: relative;
        overflow-x: hidden;
    }


    /* ==============================
       BACKGROUND GLOW
    ============================== */
    body::before {
        content: "";

        position: fixed;

        width: 380px;
        height: 380px;

        top: -150px;
        left: -130px;

        border-radius: 50%;

        background:
            rgba(14, 165, 233, 0.18);

        filter: blur(60px);

        pointer-events: none;
    }

    body::after {
        content: "";

        position: fixed;

        width: 380px;
        height: 380px;

        right: -130px;
        bottom: -150px;

        border-radius: 50%;

        background:
            rgba(139, 92, 246, 0.18);

        filter: blur(65px);

        pointer-events: none;
    }


    /* ==============================
       PAGE TITLE
    ============================== */
    h1 {
        position: relative;
        z-index: 1;

        margin-bottom: 25px;

        color: #ffffff;

        font-size: clamp(2.4rem, 6vw, 3.8rem);
        font-weight: 900;

        text-align: center;

        letter-spacing: 0.8px;

        text-shadow:
            0 5px 18px rgba(0, 0, 0, 0.28);

        animation:
            fadeDown 0.7s ease;
    }


    /* SLMS ADMIN badge */
    h1::before {
        content: "SLMS ADMIN";

        display: block;

        width: fit-content;

        margin: 0 auto 13px;

        padding: 6px 14px;

        border-radius: 20px;

        background:
            linear-gradient(
                135deg,
                #38bdf8,
                #2563eb
            );

        color: #ffffff;

        font-size: 0.7rem;
        font-weight: 800;

        letter-spacing: 1.8px;

        box-shadow:
            0 7px 18px rgba(37, 99, 235, 0.30);
    }


    /* ==============================
       FORM CARD
    ============================== */
    form {
        position: relative;
        z-index: 1;

        width: min(430px, 100%);

        padding: 36px 32px 32px;

        border-radius: 20px;

        background:
            rgba(255, 255, 255, 0.96);

        border:
            1px solid rgba(255, 255, 255, 0.85);

        box-shadow:
            0 22px 55px rgba(0, 0, 0, 0.25);

        text-align: left;

        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);

        animation:
            fadeUp 0.85s ease;
    }


    /* Decorative top line */
    form::before {
        content: "";

        position: absolute;

        top: 0;
        left: 50%;

        transform: translateX(-50%);

        width: 65%;
        height: 4px;

        border-radius: 0 0 10px 10px;

        background:
            linear-gradient(
                90deg,
                #2563eb,
                #38bdf8,
                #7c3aed
            );
    }


    /* Small message inside form */
    form::after {
        content: "Create login credentials for a new staff member";

        display: block;

        margin-top: 18px;

        color: #94a3b8;

        font-size: 0.78rem;

        text-align: center;
    }


    /* ==============================
       LABELS
    ============================== */
    label {
        display: block;

        margin-bottom: 7px;

        color: #334155;

        font-size: 0.9rem;
        font-weight: 700;

        letter-spacing: 0.2px;
    }


    /* ==============================
       INPUTS
    ============================== */
    input,
    select {
        width: 100%;

        padding: 13px 14px;

        margin-bottom: 19px;

        border:
            1.5px solid #dbe3ef;

        border-radius: 10px;

        outline: none;

        background: #f8fafc;

        color: #0f172a;

        font-family: inherit;
        font-size: 0.95rem;

        transition:
            border-color 0.25s ease,
            box-shadow 0.25s ease,
            background 0.25s ease,
            transform 0.25s ease;
    }


    input:hover,
    select:hover {
        border-color: #93c5fd;
    }


    input:focus,
    select:focus {
        border-color: #2563eb;

        background: #ffffff;

        box-shadow:
            0 0 0 4px rgba(37, 99, 235, 0.12);

        transform: translateY(-1px);
    }


    /* ==============================
       ADD STAFF BUTTON
    ============================== */
    button {
        width: 100%;

        padding: 13px 18px;

        margin-top: 2px;

        border: none;
        border-radius: 10px;

        background:
            linear-gradient(
                135deg,
                #2563eb,
                #0ea5e9
            );

        color: #ffffff;

        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 800;

        letter-spacing: 0.6px;

        cursor: pointer;

        box-shadow:
            0 9px 22px rgba(37, 99, 235, 0.28);

        transition:
            transform 0.25s ease,
            box-shadow 0.25s ease,
            background 0.25s ease;
    }


    button:hover {
        transform: translateY(-3px);

        background:
            linear-gradient(
                135deg,
                #1d4ed8,
                #0284c7
            );

        box-shadow:
            0 13px 28px rgba(37, 99, 235, 0.36);
    }


    button:active {
        transform: translateY(0);
    }


    /* ==============================
       BACK TO MANAGE STAFF LINK
    ============================== */
    body > a {
        position: relative;
        z-index: 1;

        display: inline-flex;
        justify-content: center;
        align-items: center;

        margin-top: 5px;

        padding: 11px 20px;

        border-radius: 9px;

        background:
            rgba(255, 255, 255, 0.12);

        border:
            1px solid rgba(255, 255, 255, 0.22);

        color: #ffffff;

        font-size: 0.9rem;
        font-weight: 700;

        text-decoration: none;

        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);

        transition:
            transform 0.25s ease,
            background 0.25s ease,
            box-shadow 0.25s ease;
    }


    body > a::before {
        content: "←";

        margin-right: 8px;

        font-size: 1.1rem;

        transition:
            transform 0.25s ease;
    }


    body > a:hover {
        transform: translateY(-2px);

        background:
            rgba(255, 255, 255, 0.22);

        box-shadow:
            0 8px 18px rgba(0, 0, 0, 0.16);
    }


    body > a:hover::before {
        transform: translateX(-3px);
    }


    /* ==============================
       ANIMATIONS
    ============================== */
    @keyframes fadeDown {
        from {
            opacity: 0;
            transform: translateY(-22px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }


    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(22px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }


    /* ==============================
       TABLET RESPONSIVE
    ============================== */
    @media (max-width: 768px) {

        body {
            padding: 32px 18px;
        }

        form {
            padding: 32px 27px 28px;
        }
    }


    /* ==============================
       MOBILE RESPONSIVE
    ============================== */
    @media (max-width: 480px) {

        body {
            padding: 25px 14px;
        }

        h1 {
            font-size: 2.3rem;

            margin-bottom: 21px;
        }

        form {
            width: 100%;

            padding: 29px 20px 25px;

            border-radius: 16px;
        }

        label {
            font-size: 0.86rem;
        }

        input,
        select {
            padding: 12px;

            margin-bottom: 16px;

            font-size: 0.9rem;
        }

        button {
            padding: 12px;

            font-size: 0.9rem;
        }

        body > a {
            padding: 10px 16px;

            font-size: 0.84rem;
        }
    }


    /* ==============================
       REDUCED MOTION
    ============================== */
    @media (prefers-reduced-motion: reduce) {

        h1,
        form {
            animation: none;
        }

        input,
        select,
        button,
        body > a {
            transition: none;
        }
    }
</style>
</head>
<body>
    <h1>Add Staff</h1>
    <form method = "POST">
        {% csrf_token %}
        <label for = "username">Username</label>
        <input type = "text" name = "username" id = "username" required>
        <label for = "password">Password</label>
        <input type = "password" name = "password" id = "password" required>
        <button type = "submit">Add Staff</button>
    </form>
    <br>
    <a href="{% url 'manage_staff' %}">Back to Manage Staff</a>
</body>
</html>
